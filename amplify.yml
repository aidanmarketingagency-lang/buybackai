version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            # Forward Amplify console env vars into .env.production so Next.js
            # picks them up during page-data collection. Without this, NEXT_PUBLIC_*
            # vars (and any server-side var read at module-eval time) are undefined
            # during `next build` and the build fails with cryptic "X is required" errors.
            - env | grep -E '^(NEXT_PUBLIC_|SUPABASE_|ANTHROPIC_|GOOGLE_|STRIPE_|RESEND_|CRON_SECRET|EMAIL_UNSUB_SECRET|NODE_OPTIONS)' >> .env.production || true
            # Debug: print key NAMES (not values) the build sees, so we can tell
            # whether the Amplify console env vars are actually reaching this phase.
            - echo "::: env keys visible to build :::" && env | grep -E '^(NEXT_PUBLIC_|SUPABASE_|ANTHROPIC_|GOOGLE_|STRIPE_|RESEND_|CRON_SECRET|EMAIL_UNSUB_SECRET|NODE_OPTIONS)' | cut -d= -f1 | sort || echo "(none matched)"
            - echo "::: .env.production keys :::" && (cut -d= -f1 .env.production 2>/dev/null | sort | uniq) || echo "(empty or missing)"
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - .next/cache/**/*
          - .npm/**/*
          - node_modules/**/*
